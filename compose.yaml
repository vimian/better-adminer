# Access Adminer at http://localhost:8080
# Use host.docker.internal in the Adminer login form to reach services running on your machine.
services:
  adminer:
    build:
      context: .
      dockerfile: Dockerfile
    image: adminer-saved-connections:local
    container_name: adminer
    restart: no
    ports:
      - "8080:8080"
    volumes:
      - ./data:/var/lib/adminer
