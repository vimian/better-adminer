# Adminer uses the host network so "localhost" in the DB login form
# reaches your machine (and other containers' published ports).
# Access Adminer at http://localhost:8080
# Windows: enable "Enable host networking" in Docker Desktop → Settings → Resources → Network
services:
  adminer:
    build:
      context: .
      dockerfile: Dockerfile
    image: adminer-saved-connections:local
    container_name: adminer
    restart: no
    network_mode: host
    volumes:
      - ./data:/var/lib/adminer
